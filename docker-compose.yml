version: '3.8'

services:
  # La base de données
  mongodb:
    image: mongo:latest
    container_name: bdd_hopital
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: HopitalPassword2026!    
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Le script Python
  migration_python:
    build: .
    container_name: script_migration
    depends_on:
      - mongodb

volumes:
  mongo_data: